name: cadence

services:
  postgres-database:
    image: postgres:alpine
    container_name: postgres-database
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    ports:
      - "5432:5432"

  express-api:
    build:
      context: .
    container_name: express-api
    restart: always
    ports:
      - "3000:3000"     # Expose Express on port 3000
      - "5555:5555"     # Expose Prisma Studio on port 5555
    depends_on:
      - postgres-database
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DATABASE}?schema=public"
    volumes:
      - ./api:/app # Mount project directory (local api) inside the container
      - node_modules:/app/node_modules # Named volume instead of an anonymous one
    command: |
      sh -c "
        # Check if the project already exists by looking for package.json
        if [ -f package.json ]; then
          echo 'Project already exists. Skipping setup...';
        else
          echo 'Project does not exist. Initialising...'

          # Initialise a new Node.js project
          npm init -y;

          # Initialise Prisma
          npx prisma init;

          # Create index.js if it does not exist
          if [ ! -f index.js ]; then
            echo 'const express = require(\"express\");' > index.js;
            echo 'const app = express();' >> index.js;
            echo 'app.get(\"/\", (req, res) => res.send(\"Hello, Docker!\"));' >> index.js;
            echo 'app.listen(3000, () => console.log(\"Server running on port 3000\"));' >> index.js
          fi;
        fi;

        # Start the Express app
        node index.js
      "

volumes:
  node_modules:
